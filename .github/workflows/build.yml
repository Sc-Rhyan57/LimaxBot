name: Build LimaxBot APK

on:
  workflow_dispatch:
    inputs:
      buildType:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Baixar binário node para cada ABI e colocar em assets
        run: |
          npm install nodejs-mobile-react-native@18.20.4

          PKG="node_modules/nodejs-mobile-react-native/android"

          echo "=== Binários disponíveis no pacote ==="
          find "$PKG" -name "node" -o -name "libnode.so" | head -20

          # O pacote tem o binário 'node' em android/libnode/bin/<abi>/libnode.so
          # que na verdade É o executável node renomeado para .so para o Android carregar
          # Vamos colocá-lo como assets/bin/<abi>/node

          mkdir -p app/src/main/assets/bin

          for ABI in armeabi-v7a arm64-v8a x86 x86_64; do
            SRC="$PKG/libnode/bin/$ABI/libnode.so"
            if [ -f "$SRC" ]; then
              mkdir -p app/src/main/assets/bin/$ABI
              cp "$SRC" app/src/main/assets/bin/$ABI/node
              echo "OK: assets/bin/$ABI/node ($(du -h "$SRC" | cut -f1))"
            fi
          done

          echo "=== Assets/bin ==="
          find app/src/main/assets/bin -type f

      - name: Instalar dependências do bot
        run: |
          cd nodejs-assets/nodejs-project
          npm install --omit=dev
          echo "Pacotes instalados: $(ls node_modules | wc -l)"

      - uses: gradle/actions/setup-gradle@v3

      - name: Tornar gradlew executável
        run: chmod +x gradlew

      - name: Baixar gradle-wrapper.jar (se ausente)
        run: |
          JAR="gradle/wrapper/gradle-wrapper.jar"
          if [ ! -f "$JAR" ]; then
            mkdir -p gradle/wrapper
            GRADLE_VERSION=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties | sed 's/.*gradle-\(.*\)-bin.zip/\1/')
            curl -fsSL "https://github.com/gradle/gradle/raw/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar" -o "$JAR" 2>/dev/null || \
            (curl -fsSL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o /tmp/g.zip && \
              python3 -c "
          import zipfile,sys
          with zipfile.ZipFile('/tmp/g.zip') as z:
            n=[x for x in z.namelist() if x.endswith('gradle-wrapper.jar')]
            open('$JAR','wb').write(z.open(n[0]).read()) if n else sys.exit(1)
          ")
            ls -lh "$JAR"
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Decode Keystore
        if: inputs.buildType == 'release'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks

      - name: Build APK
        run: ./gradlew :app:assemble${{ inputs.buildType == 'release' && 'Release' || 'Debug' }}
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LimaxBot-${{ inputs.buildType }}
          path: app/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: Criar Release
        if: inputs.buildType == 'release'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v2.0.${{ github.run_number }}
          name: LimaxBot v2.0.${{ github.run_number }}
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
