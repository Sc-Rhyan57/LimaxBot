name: Build LimaxBot APK

on:
  workflow_dispatch:
    inputs:
      buildType:
        description: 'Tipo de build'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts') }}

      - name: Extrair libnode.so do npm para jniLibs
        run: |
          npm pack nodejs-mobile-react-native@18.20.4
          mkdir -p npm_extract
          tar -xzf nodejs-mobile-react-native-*.tgz -C npm_extract

          find npm_extract -name "*.so" | head -20
          find npm_extract -name "libnode*" | head -20

          declare -A ABI_MAP=(
            ["arm64-v8a"]="arm64-v8a"
            ["armeabi-v7a"]="armeabi-v7a"
            ["x86"]="x86"
            ["x86_64"]="x86_64"
          )

          for abi in "${!ABI_MAP[@]}"; do
            android_abi="${ABI_MAP[$abi]}"
            dest="app/src/main/jniLibs/$android_abi"
            mkdir -p "$dest"

            src="npm_extract/package/android/libnode/bin/$abi/libnode.so"
            if [ -f "$src" ]; then
              cp "$src" "$dest/libnode.so"
              echo "OK: $abi -> $dest/libnode.so ($(du -sh $dest/libnode.so | cut -f1))"
            else
              echo "AVISO: $abi nao encontrado em $src"
              find npm_extract -path "*/$abi*" -name "*.so" 2>/dev/null | head -5
            fi
          done

          find app/src/main/jniLibs -name "*.so"

      - name: Instalar node_modules do bot
        run: |
          cd nodejs-assets/nodejs-project
          npm install --production
          echo "node_modules instalados: $(ls node_modules | wc -l) pacotes"

      - name: Tornar gradlew executável
        run: chmod +x gradlew

      - name: Decodificar keystore
        if: ${{ github.event.inputs.buildType == 'release' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Build Debug
        if: ${{ github.event.inputs.buildType == 'debug' }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release
        if: ${{ github.event.inputs.buildType == 'release' }}
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_FILE: ${{ github.workspace }}/keystore.jks
        run: ./gradlew assembleRelease --no-daemon

      - name: Encontrar APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "APK: $APK"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LimaxBot-${{ github.event.inputs.buildType }}-${{ github.run_number }}
          path: ${{ steps.apk.outputs.path }}

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.${{ github.run_number }}
          name: "LimaxBot v2.0.${{ github.run_number }} (${{ github.event.inputs.buildType }})"
          files: ${{ steps.apk.outputs.path }}
          body: |
            Build automatico via GitHub Actions
            Tipo: ${{ github.event.inputs.buildType }}
            Run: #${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
