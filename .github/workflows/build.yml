name: Build LimaxBot APK

on:
  workflow_dispatch:
    inputs:
      buildType:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar nodejs-mobile-react-native e extrair libnode.so
        run: |
          npm install nodejs-mobile-react-native@0.18.0
          echo "=== Conteúdo do pacote nodejs-mobile-react-native ==="
          find node_modules/nodejs-mobile-react-native -maxdepth 3 | head -40

          # Copiar libnode.so para o módulo local (usado no build)
          JNI_SRC=$(find node_modules/nodejs-mobile-react-native -type d -name "jniLibs" | head -1)
          if [ -n "$JNI_SRC" ]; then
            echo "Copiando jniLibs de: $JNI_SRC"
            cp -r "$JNI_SRC/." nodejs-mobile-module/src/main/jniLibs/
          else
            echo "ERRO: jniLibs não encontrada no pacote npm!"
            find node_modules/nodejs-mobile-react-native -name "*.so" | head -10
            exit 1
          fi

          # Também copiar para app (caso jniLibs esteja direto no app)
          mkdir -p app/src/main/jniLibs
          cp -r nodejs-mobile-module/src/main/jniLibs/. app/src/main/jniLibs/
          echo "libnode.so(s) disponíveis:"
          find nodejs-mobile-module/src/main/jniLibs -name "*.so"

      - name: Instalar dependências do bot
        run: |
          cd nodejs-assets/nodejs-project
          npm install --omit=dev
          echo "node_modules instalados: $(ls node_modules | wc -l) pacotes"

      - uses: gradle/actions/setup-gradle@v3

      - name: Tornar gradlew executável
        run: chmod +x gradlew

      - name: Baixar gradle-wrapper.jar (se ausente)
        run: |
          JAR="gradle/wrapper/gradle-wrapper.jar"
          if [ ! -f "$JAR" ]; then
            echo "Baixando gradle-wrapper.jar..."
            mkdir -p gradle/wrapper
            GRADLE_VERSION=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties | sed 's/.*gradle-\(.*\)-bin.zip/\1/')
            curl -fL "https://github.com/gradle/gradle/raw/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar" -o "$JAR" 2>/dev/null || \
            (curl -fL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o /tmp/g.zip && \
             python3 -c "import zipfile,shutil; z=zipfile.ZipFile('/tmp/g.zip'); [shutil.copyfileobj(z.open(n),open('$JAR','wb')) for n in z.namelist() if n.endswith('gradle-wrapper.jar')]")
            ls -lh "$JAR"
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Decode Keystore
        if: inputs.buildType == 'release'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks

      - name: Build APK
        run: ./gradlew :app:assemble${{ inputs.buildType == 'release' && 'Release' || 'Debug' }}
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LimaxBot-${{ inputs.buildType }}
          path: app/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: Criar Release
        if: inputs.buildType == 'release'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v2.0.${{ github.run_number }}
          name: LimaxBot v2.0.${{ github.run_number }}
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
