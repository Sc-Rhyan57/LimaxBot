name: Build LimaxBot APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Tipo de build'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts') }}

      # ── Baixar nodejs-mobile-react-native para extrair libnode.so ──────────────
      # O binário Node.js vem como libnode.so dentro do pacote npm.
      # Precisamos colocá-lo em jniLibs/<abi>/libnode.so para que o Android
      # o instale em nativeLibraryDir — único diretório executável (W^X policy).
      - name: Extrair libnode.so do npm para jniLibs
        run: |
          npm pack nodejs-mobile-react-native@18.20.4
          mkdir -p npm_extract
          tar -xzf nodejs-mobile-react-native-*.tgz -C npm_extract

          echo "Conteúdo do pacote npm:"
          find npm_extract -name "*.so" | head -20
          find npm_extract -name "libnode*" | head -20

          # Mapear ABIs npm → Android
          declare -A ABI_MAP=(
            ["arm64-v8a"]="arm64-v8a"
            ["armeabi-v7a"]="armeabi-v7a"
            ["x86"]="x86"
            ["x86_64"]="x86_64"
          )

          for abi in "${!ABI_MAP[@]}"; do
            android_abi="${ABI_MAP[$abi]}"
            dest="app/src/main/jniLibs/$android_abi"
            mkdir -p "$dest"

            # O libnode.so real fica em android/libnode/bin/<abi>/libnode.so
            src="npm_extract/package/android/libnode/bin/$abi/libnode.so"
            if [ -f "$src" ]; then
              cp "$src" "$dest/libnode.so"
              echo "✅ $abi → $dest/libnode.so ($(du -sh $dest/libnode.so | cut -f1))"
            else
              echo "⚠️  $abi não encontrado em $src"
              find npm_extract -path "*/$abi*" -name "*.so" 2>/dev/null | head -5
            fi
          done

          echo "jniLibs gerado:"
          find app/src/main/jniLibs -name "*.so"

      # ── Instalar dependências do bot ───────────────────────────────────────────
      - name: Instalar node_modules do bot
        run: |
          cd nodejs-assets/nodejs-project
          npm install --production
          echo "node_modules instalados: $(ls node_modules | wc -l) pacotes"

      # ── Keystore (só para release) ─────────────────────────────────────────────
      - name: Decodificar keystore
        if: ${{ github.event.inputs.build_type == 'release' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      # ── Build ──────────────────────────────────────────────────────────────────
      - name: Build Debug
        if: ${{ github.event.inputs.build_type == 'debug' }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release
        if: ${{ github.event.inputs.build_type == 'release' }}
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_FILE: ${{ github.workspace }}/keystore.jks
        run: ./gradlew assembleRelease --no-daemon

      # ── Upload APK ─────────────────────────────────────────────────────────────
      - name: Encontrar APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "APK: $APK"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LimaxBot-${{ github.event.inputs.build_type }}-${{ github.run_number }}
          path: ${{ steps.apk.outputs.path }}

      # ── Release automática ─────────────────────────────────────────────────────
      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.${{ github.run_number }}
          name: "LimaxBot v2.0.${{ github.run_number }} (${{ github.event.inputs.build_type }})"
          files: ${{ steps.apk.outputs.path }}
          body: |
            Build automático via GitHub Actions
            Tipo: ${{ github.event.inputs.build_type }}
            Run: #${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
